version: '3'

services:
  db:
    image: postgres
      environment:
        - POSTGRES_DB=clarityv2
        - POSTGRES_USER=clarityv2
        - POSTGRES_PASSWORD=clarityv2

  web:
    build: ..
    container_name: clarityv2
    volumes:
      - ..:/clarityv2
    ports:
    - 8000:8000
    depends_on:
      - db

  nginx:
    image: nginx
    volumes:
    - ./nginx.default:/etc/nginx/conf.d/default.conf
     ports:
      - "9000:80"
     depends_on:
      - web